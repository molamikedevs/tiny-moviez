<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <!--
      <link rel="shortcut icon" href="src/img/favicon.png" type="image/x-icon" />
    -->

    <link rel="stylesheet" href="src/sass/main.scss" />
    <script type="module" defer src="src/js/controller.js"></script>

    <title>Tiny Moviez // Search over 1,000,000 movies</title>
  </head>

  <body class="app">
    <div class="dashboard">
      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar__logo">
          <h2 class="logo">
            TINY<br />
            MOVIEZ
          </h2>
        </div>

        <!-- MENU -->
        <div class="sidebar__section">
          <p class="sidebar__title">Menu</p>

          <ul class="sidebar__menu">
            <li class="menu__item active" data-type="home">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-home"></use>
              </svg>
              Home
            </li>

            <li class="menu__item" data-type="movie">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-film"></use>
              </svg>
              Movies
            </li>
            <li class="menu__item" data-type="tv">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-display"></use>
              </svg>
              TV Shows
            </li>
            <li class="menu__item" data-type="anime">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-dice"></use>
              </svg>
              Anime
            </li>
          </ul>
        </div>

        <!-- LIBRARY -->
        <div class="sidebar__section">
          <p class="sidebar__title">Library</p>

          <ul class="sidebar__menu">
            <li class="menu__item" data-type="recent">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-clock"></use>
              </svg>
              Recent
            </li>

            <li class="menu__item" data-type="topRated">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-star-empty"></use>
              </svg>
              Top Rated
            </li>

            <li class="menu__item" data-type="trending">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-trending-up"></use>
              </svg>
              Trending
            </li>

            <li class="menu__item" data-type="bookmarks">
              <svg class="menu__icon">
                <use href="src/img/icons.svg#icon-bookmarks"></use>
              </svg>
              Bookmarks
            </li>
          </ul>
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="main">
        <!-- TOP NAV -->
        <header class="topbar">
          <nav class="topbar__nav">
            <button class="nav__link" data-type="movie">Movies</button>
            <button class="nav__link active" data-type="tv">TV Shows</button>
            <button class="nav__link" data-type="anime">Anime</button>
          </nav>

          <form class="topbar__search">
            <input type="text" placeholder="Search" class="search__input" />

            <button class="search__btn">
              <svg class="search__icon">
                <use href="src/img/icons.svg#icon-search"></use>
              </svg>
            </button>
          </form>
        </header>

        <!-- HERO / SLIDER -->
        <section class="hero">
          <div class="hero__media">
            <img class="hero__img" src="#" alt="Hero banner" />
          </div>

          <div class="hero__overlay"></div>

          <div class="hero__content">
            <h1 class="hero__title"></h1>

            <div class="hero__actions">
              <button class="btn btn--bookmark" data-id=".." data-type="..">
                Bookmark
              </button>

              <button class="btn btn--primary">Details</button>
            </div>
          </div>

          <div class="hero__controls">
            <button class="slider__btn slider__btn--prev">
              <svg class="slider__icon">
                <use href="src/img/icons.svg#icon-arrow-left2"></use>
              </svg>
            </button>

            <button class="slider__btn slider__btn--next">
              <svg class="slider__icon">
                <use href="src/img/icons.svg#icon-arrow-right2"></use>
              </svg>
            </button>
          </div>
        </section>
        <div class="modal">
          <!--
          <div class="modal__content">
        <button class="modal__close">×</button>

        <img class="modal__poster" src="${data.poster_path ? IMG + data.poster_path : ''}" alt="${title}" />

            <span class="modal__divider">|</span>
            <span>${country}</span>
          </div>

          <div class="modal__overview-container">
            <h3 class="modal__subtitle">Overview</h3>
            <p class="modal__overview">
              ${data.overview || 'No overview available for this title.'}
            </p>
          </div>

          <div class="modal__stats">
            <div class="stat">
              <span class="stat__label">Popularity</span>
              <span class="stat__value">${popularity}</span>
            </div>
            <div class="stat">
              <span class="stat__label">Vote Count</span>
              <span class="stat__value">${votes}</span>
            </div>
          </div>
        </div>
      </div>
          -->
        </div>
        <!-- POPULAR MOVIES -->
        <section class="movies">
          <h2 class="section__title">Popular on TinyMoviez</h2>

          <div class="movies__grid">
            <!-- MOVIE CARD -->

            <!--
            <article
              class="movie-card"
              data-id="${id}"
              data-type="${media_type}"
            >
              <img
                src="${IMG_URL + poster_path}"
                class="movie-card__poster"
                alt="${title}"
              />

              <div class="movie-card__info">
                <h3 class="movie-card__title">${title}</h3>

                <div class="movie-card__meta">
                  <span>${vote_average.toFixed(1)} ⭐</span>
                  <span>${release_date?.slice(0, 4) || ''}</span>
                </div>

                <div class="movie-card__actions">
                  <button
                    class="btn btn--details"
                    data-id="${id}"

                  >
                    Details
                  </button>

                  <button
                    class="btn btn--bookmark"
                    data-id="${id}"
                    data-type="${media_type}"

                    <svg class="btn__icon">
                      <use href="${icons}#icon-bookmark"></use>
                    </svg>
                  </button>
                </div>
              </div>
            </article>
            -->
          </div>
        </section>

        <div class="pagination"></div>
      </main>

      <!-- RIGHT SIDEBAR -->
      <aside class="rightbar">
        <!-- TRENDING NOW -->
        <section class="widget">
          <div class="widget__header">
            <h3>Trending Now 🔥</h3>
            <a href="#">View All</a>
          </div>

          <div class="trending__list">
            <div class="trending__item">
              <span class="trending__item-rank">1</span>
              <div class="trending__item-info">
                <h4>Dune: Part Two</h4>
                <p>⭐ 8.7 <span class="trending__badge">+2</span></p>
              </div>
            </div>
            <!-- More trending items... -->
          </div>
        </section>

        <!-- RECOMMENDED FOR YOU -->
        <section class="widget">
          <div class="widget__header">
            <h3>Recommended 🎯</h3>
            <a href="#">More</a>
          </div>

          <div class="recommendations__list">
            <div class="recommendation__item">
              <div class="recommendation__item-poster"></div>
              <div class="recommendation__item-info">
                <h4>The Last of Us</h4>
                <span class="match">98% Match</span>
              </div>
              <button class="recommendation__play" title="Play">
                <svg>
                  <use href="src/img/icons.svg#icon-play"></use>
                </svg>
              </button>
            </div>
            <!-- More recommendations... -->
          </div>
        </section>

        <!-- GENRES -->
        <section class="widget">
          <div class="widget__header">
            <h3>Popular Genres</h3>
          </div>

          <div class="genres__grid">
            <button class="genre active">Action</button>
            <button class="genre">Adventure</button>
            <button class="genre">Animation</button>
            <button class="genre">Comedy</button>
            <button class="genre">Crime</button>
            <button class="genre">Documentary</button>
            <button class="genre">Drama</button>
            <button class="genre">Family</button>
            <button class="genre">Fantasy</button>
            <button class="genre">Horror</button>
            <button class="genre">Mystery</button>
            <button class="genre">Romance</button>
            <button class="genre">Sci-Fi</button>
            <button class="genre">Thriller</button>
          </div>

          <div class="widget__footer">
            <button>Load More Genres</button>
          </div>
        </section>
      </aside>
    </div>
  </body>
</html>
